name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: sudo apt-get install -y gcc libsqlite3-dev
      - run: go test -race -coverprofile=coverage.txt ./...
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.txt

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: sudo apt-get install -y gcc libsqlite3-dev
      - run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags "-s -w" -o xmanager-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/xmanager
      - uses: actions/upload-artifact@v4
        with:
          name: xmanager-${{ matrix.goos }}-${{ matrix.goarch }}
          path: xmanager-${{ matrix.goos }}-${{ matrix.goarch }}
