name: "Ubuntu LEMP Stack"
description: "Install Nginx, MySQL, PHP on Ubuntu server"
target_os: "ubuntu"
steps:
  - name: "Update System"
    description: "Update package cache and upgrade packages"
    commands:
      - "sudo apt-get update -y"
      - "sudo apt-get upgrade -y"
    skip_allowed: true

  - name: "Install Nginx"
    description: "Install and enable Nginx web server"
    commands:
      - "sudo apt-get install -y nginx"
      - "sudo systemctl enable nginx"
      - "sudo systemctl start nginx"
    skip_allowed: false

  - name: "Install MySQL"
    description: "Install MySQL server"
    commands:
      - "sudo apt-get install -y mysql-server"
      - "sudo systemctl enable mysql"
      - "sudo systemctl start mysql"
    skip_allowed: true

  - name: "Install PHP"
    description: "Install PHP-FPM and common extensions"
    commands:
      - "sudo apt-get install -y php-fpm php-mysql php-xml php-mbstring php-curl php-zip php-gd php-intl"
    skip_allowed: false

  - name: "Configure Nginx for PHP"
    description: "Enable PHP-FPM in the default Nginx site"
    commands:
      - "sudo sed -i 's/index index.html/index index.php index.html/' /etc/nginx/sites-available/default"
      - "sudo nginx -t"
      - "sudo systemctl reload nginx"
    skip_allowed: true

  - name: "Verify Stack"
    description: "Create PHP info page and test"
    commands:
      - "echo '<?php phpinfo();' | sudo tee /var/www/html/info.php"
      - "curl -sI http://localhost/info.php | head -1"
      - "sudo rm /var/www/html/info.php"
    skip_allowed: true
